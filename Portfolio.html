<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nanjing Portfolio · Dark Gold Edition</title>
  <style>
    /* --- Reset & Base --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #1a1a2e, #0f0f1a 70%);
      min-height: 100vh;
      padding: 2rem 1.5rem;
      color: #e2e8f0;
      position: relative;
    }

    /* Efek bintang/kilauan halus di background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        radial-gradient(2px 2px at 20% 30%, rgba(212, 175, 55, 0.15), transparent),
        radial-gradient(2px 2px at 40% 70%, rgba(212, 175, 55, 0.1), transparent),
        radial-gradient(1px 1px at 70% 20%, rgba(212, 175, 55, 0.2), transparent),
        radial-gradient(1px 1px at 90% 80%, rgba(212, 175, 55, 0.1), transparent),
        radial-gradient(1px 1px at 10% 90%, rgba(212, 175, 55, 0.15), transparent);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1280px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    /* --- Header Mewah --- */
    .page-header {
      text-align: center;
      margin-bottom: 3rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(212, 175, 55, 0.2);
      position: relative;
    }

    .page-header::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 25%;
      right: 25%;
      height: 1px;
      background: linear-gradient(90deg, transparent, #d4af37, transparent);
    }

    .page-header h1 {
      font-size: 2.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #f9e07f, #d4af37, #b8860b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 40px rgba(212, 175, 55, 0.2);
      display: inline-block;
    }

    .page-header .subtitle {
      display: block;
      font-size: 1rem;
      font-weight: 300;
      color: #94a3b8;
      margin-top: 0.3rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .badge-count {
      display: inline-block;
      background: rgba(212, 175, 55, 0.15);
      color: #d4af37;
      padding: 0.3rem 1.5rem;
      border-radius: 30px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-top: 0.5rem;
      border: 1px solid rgba(212, 175, 55, 0.2);
      backdrop-filter: blur(10px);
    }

    /* --- Grid Kartu --- */
    .portfolio-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin-top: 1rem;
    }

    /* --- Kartu Glassmorphism --- */
    .portfolio-card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 1.8rem 1.5rem 1.5rem;
      border: 1px solid rgba(212, 175, 55, 0.15);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(212, 175, 55, 0.1);
      transition: transform 0.3s ease, box-shadow 0.4s ease, border-color 0.3s ease;
      display: flex;
      flex-direction: column;
      opacity: 0;
      animation: fadeUp 0.6s ease forwards;
      position: relative;
      overflow: hidden;
    }

    /* Efek glow di pojok kartu */
    .portfolio-card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 20%, rgba(212, 175, 55, 0.03), transparent 60%);
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .portfolio-card:hover {
      transform: translateY(-8px);
      border-color: rgba(212, 175, 55, 0.4);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6), 0 0 30px rgba(212, 175, 55, 0.05), inset 0 1px 0 rgba(212, 175, 55, 0.2);
    }

    .portfolio-card:hover::before {
      opacity: 0.5;
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* --- Isi Kartu --- */
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
      position: relative;
      z-index: 1;
    }

    .card-number {
      font-size: 0.7rem;
      font-weight: 700;
      color: #d4af37;
      letter-spacing: 0.5px;
      background: rgba(212, 175, 55, 0.1);
      padding: 0.15rem 0.8rem;
      border-radius: 30px;
      border: 1px solid rgba(212, 175, 55, 0.15);
    }

    .status-badge {
      font-size: 0.6rem;
      font-weight: 600;
      text-transform: uppercase;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      letter-spacing: 0.3px;
    }

    .status-active { 
      background: rgba(74, 222, 128, 0.15); 
      color: #4ade80; 
      border: 1px solid rgba(74, 222, 128, 0.2);
    }
    .status-dev { 
      background: rgba(251, 191, 36, 0.15); 
      color: #fbbf24; 
      border: 1px solid rgba(251, 191, 36, 0.2);
    }
    .status-archived { 
      background: rgba(148, 163, 184, 0.15); 
      color: #94a3b8; 
      border: 1px solid rgba(148, 163, 184, 0.2);
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 600;
      margin: 0.4rem 0 0.2rem;
      color: #f1f5f9;
      line-height: 1.3;
      position: relative;
      z-index: 1;
      letter-spacing: 0.02em;
    }

    .card-title .gold-accent {
      color: #d4af37;
    }

    .card-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.5rem 1rem;
      background: rgba(0, 0, 0, 0.3);
      padding: 0.8rem 1rem;
      border-radius: 14px;
      margin: 0.6rem 0 1rem;
      font-size: 0.8rem;
      border: 1px solid rgba(212, 175, 55, 0.05);
      position: relative;
      z-index: 1;
    }

    .stat-item {
      display: flex;
      justify-content: space-between;
    }
    .stat-label { 
      color: #94a3b8; 
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-value { 
      font-weight: 600; 
      color: #f9e07f; 
      font-size: 0.85rem;
    }

    .card-updated {
      font-size: 0.7rem;
      color: #64748b;
      margin-bottom: 0.5rem;
      position: relative;
      z-index: 1;
    }

    .card-link {
      display: inline-block;
      background: linear-gradient(135deg, #d4af37, #b8860b);
      color: #0f0f1a;
      text-decoration: none;
      padding: 0.6rem 1.5rem;
      border-radius: 40px;
      font-weight: 700;
      font-size: 0.85rem;
      text-align: center;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
      align-self: flex-start;
      margin-top: 0.2rem;
      position: relative;
      z-index: 1;
      letter-spacing: 0.03em;
      box-shadow: 0 4px 15px rgba(212, 175, 55, 0.2);
    }

    .card-link:hover {
      transform: scale(0.97);
      box-shadow: 0 6px 25px rgba(212, 175, 55, 0.4);
      background: linear-gradient(135deg, #f9e07f, #d4af37);
    }

    /* --- Empty State --- */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      border-radius: 40px;
      border: 1px solid rgba(212, 175, 55, 0.1);
      color: #94a3b8;
    }

    .empty-state h3 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #d4af37;
    }

    /* --- Footer --- */
    .page-footer {
      margin-top: 4rem;
      text-align: center;
      font-size: 0.85rem;
      color: #475569;
      border-top: 1px solid rgba(212, 175, 55, 0.1);
      padding-top: 2rem;
      position: relative;
    }

    .page-footer a {
      color: #d4af37;
      text-decoration: none;
      transition: color 0.2s;
    }

    .page-footer a:hover {
      color: #f9e07f;
      text-decoration: underline;
    }

    /* --- Responsive --- */
    @media (max-width: 480px) {
      body { padding: 1rem; }
      .page-header h1 { font-size: 2rem; }
      .portfolio-grid { gap: 1.2rem; }
      .card-stats { grid-template-columns: 1fr; }
      .portfolio-card { padding: 1.2rem; }
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- HEADER -->
    <header class="page-header">
      <h1>✦ Nanjing Portfolio ✦</h1>
      <span class="subtitle">Trading System &amp; Strategy Gallery</span>
      <div class="badge-count" id="portfolioCount">Memuat...</div>
    </header>

    <!-- GRID PORTFOLIO -->
    <div class="portfolio-grid" id="portfolioGrid">
      <!-- Kartu akan di-generate oleh JavaScript -->
    </div>

    <!-- FOOTER -->
    <footer class="page-footer">
      <p>
        <a href="https://nanjingtouzi.github.io/LIFECODE/" target="_blank">← Kembali ke Beranda</a>
        &nbsp;·&nbsp; 
        <span id="yearFooter"></span> Nanjing Investasi
      </p>
    </footer>

  </div>

  <script>
    // ============================================================
    // 1. DATA SEMUA PORTOFOLIO (Tambah/Edit di sini!)
    // ============================================================
    const portfolios = [
      {
        id: 1,
        title: "WAIVER 1",
        status: "active",
        updated: "2026-07-24",
        stats: {
          return: "+617.28%",
          winRate: "87.74%",
          drawdown: "2.60%",
          profitFactor: "6.84"
        },
        fileName: "waiver1.html"
      },
      {
        id: 2,
        title: "WAIVER 5",
        status: "active",
        updated: "2026-07-24",
        stats: {
          return: "+553,879.92%",
          winRate: "86.96%",
          drawdown: "12.40%",
          profitFactor: "5.29"
        },
        fileName: "waiver10.html"
      }
      // ============================================================
      // >> TAMBAHKAN PORTOFOLIO BARU DI SINI <<
      // ============================================================
    ];

    // ============================================================
    // 2. FUNGSI RENDER KARTU
    // ============================================================
    function renderPortfolios() {
      const grid = document.getElementById('portfolioGrid');
      const countBadge = document.getElementById('portfolioCount');

      countBadge.textContent = `${portfolios.length} Portofolio`;

      if (portfolios.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <h3>✦ Belum ada portofolio ✦</h3>
            <p>Portofolio trading akan segera ditambahkan.</p>
          </div>
        `;
        return;
      }

      let cardsHTML = '';
      portfolios.forEach((p, index) => {
        let statusClass = 'status-active';
        let statusText = 'Aktif';
        if (p.status === 'dev') {
          statusClass = 'status-dev';
          statusText = 'Pengembangan';
        } else if (p.status === 'archived') {
          statusClass = 'status-archived';
          statusText = 'Arsip';
        }

        const filePath = `https://nanjingtouzi.github.io/LIFECODE/porto/${p.fileName}`;
        const updateDate = p.updated ? new Date(p.updated).toLocaleDateString('id-ID', {
          day: 'numeric', month: 'short', year: 'numeric'
        }) : '—';

        const stats = p.stats || {};
        const returnVal = stats.return || '—';
        const winRateVal = stats.winRate || '—';
        const drawdownVal = stats.drawdown || '—';
        const pfVal = stats.profitFactor || '—';

        cardsHTML += `
          <div class="portfolio-card" style="animation-delay: ${index * 0.08}s">
            <div class="card-header">
              <span class="card-number">#${String(p.id).padStart(2, '0')}</span>
              <span class="status-badge ${statusClass}">${statusText}</span>
            </div>
            <h3 class="card-title">${p.title}</h3>
            <div class="card-stats">
              <div class="stat-item"><span class="stat-label">Return</span><span class="stat-value">${returnVal}</span></div>
              <div class="stat-item"><span class="stat-label">Win Rate</span><span class="stat-value">${winRateVal}</span></div>
              <div class="stat-item"><span class="stat-label">Max DD</span><span class="stat-value">${drawdownVal}</span></div>
              <div class="stat-item"><span class="stat-label">Profit Factor</span><span class="stat-value">${pfVal}</span></div>
            </div>
            <div class="card-updated">🔄 Diperbarui: ${updateDate}</div>
            <a href="${filePath}" target="_blank" class="card-link">
              ✦ Lihat Detail
            </a>
          </div>
        `;
      });

      grid.innerHTML = cardsHTML;
    }

    document.getElementById('yearFooter').textContent = new Date().getFullYear();
    document.addEventListener('DOMContentLoaded', renderPortfolios);
  </script>
</body>
</html>
